name: rag-a-muffin

services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    build:
      context: .
      dockerfile: Ollama.Dockerfile
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    environment:
      - OLLAMA_NUM_PARALLEL=1

  api:
    build: .
    image: rag-a-muffin-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - ollama
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8000
      - HOST_PROJECT_DIR=${HOST_PROJECT_DIR:-${PWD}}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # lets the app trigger restart/rebuild
      - .:/workspace:ro                             # build context for rebuild
      - ./credentials.json:/app/credentials.json
      - ./data:/app/data                            # persists connectors.json, tokens, uploads, watch

volumes:
  qdrant_data:
  ollama_data: