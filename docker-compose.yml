services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    build:
      context: .
      dockerfile: Ollama.Dockerfile
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    environment:
      - OLLAMA_NUM_PARALLEL=1

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - ollama
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8000
    volumes:
      - ./credentials.json:/app/credentials.json  # mount, never bake into image
      - ./data/tokens:/app/data/tokens  

volumes:
  qdrant_data:
  ollama_data: